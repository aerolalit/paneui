name: release

# Publishes @paneui/core and @paneui/cli to npm when a v* tag is pushed.
#
# This is the canonical release path. Procedure:
#   1. Run `./scripts/cut-release.sh <version>` — bumps every package's
#      "version", bumps the @paneui/core dep in @paneui/cli and @paneui/relay
#      (so workspace links resolve to the local copy at build time), bumps
#      the VERSION constant in packages/cli/src/version.ts, refreshes the
#      lockfile, runs a smoke build, and commits the changes on a release-
#      prep branch. Pass --push to also push and open the PR.
#   2. Review the diff, merge the PR.
#   3. Tag and push:
#         git tag v0.1.0 <merge-commit-sha> && git push origin v0.1.0
#   4. This workflow builds, runs unit tests, and publishes both packages with
#      npm provenance attached.
#   5. On a successful publish it also dispatches paneui-ops to redeploy the
#      landing page (paneui.com) from this tag, so the marketing site never
#      drifts behind a release.
#   6. It also cuts a GitHub Release for the tag (auto-generated notes) so the
#      Releases page stays in lockstep — no more tags without a Release.
#
# (Steps 1-2 can also be done by hand — the script just removes the easy-to-
# miss "@paneui/core dep in every package" bump that breaks the workspace
# build at tag-cut time.)
#
# Setup (one-time):
#   - Repo secret NPM_TOKEN — an npm automation token with publish rights on
#     the @paneui scope. Generate at https://www.npmjs.com/settings/<user>/tokens
#     (type: "Automation").
#
# @paneui/relay stays `private: true` and is never published.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: GitHub mints an OIDC token that npm
      # verifies against this workflow run, so the published package carries
      # a cryptographic proof of where it came from.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run generate --workspace @paneui/relay -- sqlite

      - run: npm run build

      - run: npm run test:unit

      # @paneui/core must publish before @paneui/cli — @paneui/cli depends on it.
      - name: publish @paneui/core
        run: npm publish --workspace @paneui/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @paneui/cli
        run: npm publish --workspace @paneui/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # After a successful publish, tell aerolalit/paneui-ops to redeploy the
  # landing page (paneui.com) from THIS tag — so the marketing site and its
  # CLI examples always match the version that just shipped. site-deploy is
  # manual-only otherwise, which let the live page drift ~2 weeks behind a
  # Surface→Pane rename + CLI restructure; wiring it into the release closes
  # that gap. The receiving side (paneui-ops site-deploy.yml) already listens
  # for repository_dispatch type "deploy-site" and resolves client_payload.ref,
  # so it checks out paneui@<tag> and deploys site/ from the exact release
  # commit. OPS_DEPLOY_TOKEN is the same fine-grained PAT (Actions: read+write
  # on paneui-ops) used by release-image's dev-relay dispatch.
  deploy-site:
    name: dispatch landing-page deploy
    needs: publish
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send repository_dispatch to paneui-ops
        env:
          OPS_DEPLOY_TOKEN: ${{ secrets.OPS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$OPS_DEPLOY_TOKEN" ]; then
            echo "::warning::OPS_DEPLOY_TOKEN not set — skipping landing-page deploy"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $OPS_DEPLOY_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aerolalit/paneui-ops/dispatches \
            -d '{"event_type":"deploy-site","client_payload":{"ref":"${{ github.ref_name }}"}}'
          echo "→ dispatched deploy-site for ${{ github.ref_name }}"

  # Cut a GitHub Release for the tag so it shows on the Releases page — the
  # human-facing changelog that npm/images/site don't provide. Previously the
  # release flow only pushed a git tag, so v0.0.6–v0.0.10 shipped to npm + GHCR
  # but never appeared as Releases (the page silently lagged at v0.0.5). This
  # closes that gap: every tagged release gets a Release with auto-generated
  # notes (the PR/commit list since the previous tag).
  #
  # `--generate-notes` resolves the previous tag itself; `--verify-tag` refuses
  # to invent a release for a tag that isn't really pushed. Idempotent — a
  # re-run (or a release created by hand first) is a no-op, not a failure.
  github-release:
    name: create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the Release object
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so --generate-notes can diff against the
          # previous tag; a shallow clone has neither.
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — skipping"
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --verify-tag --generate-notes
          echo "→ created GitHub Release $TAG"
