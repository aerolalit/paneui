name: release

# Publishes @paneui/core and @paneui/cli to npm when a v* tag is pushed.
#
# This is the canonical release path. Procedure:
#   1. Run `./scripts/cut-release.sh <version>` — bumps every package's
#      "version", bumps the @paneui/core dep in @paneui/cli and @paneui/relay
#      (so workspace links resolve to the local copy at build time), bumps
#      the VERSION constant in packages/cli/src/version.ts, refreshes the
#      lockfile, runs a smoke build, and commits the changes on a release-
#      prep branch. Pass --push to also push and open the PR.
#   2. Review the diff, merge the PR.
#   3. Tag and push:
#         git tag v0.1.0 <merge-commit-sha> && git push origin v0.1.0
#   4. This workflow builds, runs unit tests, and publishes both packages with
#      npm provenance attached.
#
# (Steps 1-2 can also be done by hand — the script just removes the easy-to-
# miss "@paneui/core dep in every package" bump that breaks the workspace
# build at tag-cut time.)
#
# Setup (one-time):
#   - Repo secret NPM_TOKEN — an npm automation token with publish rights on
#     the @paneui scope. Generate at https://www.npmjs.com/settings/<user>/tokens
#     (type: "Automation").
#
# @paneui/relay stays `private: true` and is never published.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: GitHub mints an OIDC token that npm
      # verifies against this workflow run, so the published package carries
      # a cryptographic proof of where it came from.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run generate --workspace @paneui/relay -- sqlite

      - run: npm run build

      - run: npm run test:unit

      # @paneui/core must publish before @paneui/cli — @paneui/cli depends on it.
      - name: publish @paneui/core
        run: npm publish --workspace @paneui/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @paneui/cli
        run: npm publish --workspace @paneui/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
