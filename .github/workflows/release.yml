name: release

# Publishes @pane/core and @pane/cli to npm when a v* tag is pushed.
#
# This is the canonical release path. Procedure:
#   1. Bump the "version" field in packages/core, packages/cli (and, for
#      consistency, packages/relay + the root) to the new version. Bump the
#      `VERSION` constant in packages/cli/src/index.ts to match.
#   2. Update the `@pane/core` dependency in packages/cli/package.json to the
#      same new version. Run `npm install` so package-lock.json picks it up.
#   3. Commit, then tag and push:
#         git tag v0.1.0 && git push origin main --tags
#   4. This workflow builds, runs unit tests, and publishes both packages with
#      npm provenance attached.
#
# Setup (one-time):
#   - Repo secret NPM_TOKEN — an npm automation token with publish rights on
#     the @pane scope. Generate at https://www.npmjs.com/settings/<user>/tokens
#     (type: "Automation").
#
# @pane/relay stays `private: true` and is never published.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: GitHub mints an OIDC token that npm
      # verifies against this workflow run, so the published package carries
      # a cryptographic proof of where it came from.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run generate --workspace @pane/relay -- sqlite

      - run: npm run build

      - run: npm run test:unit

      # @pane/core must publish before @pane/cli — @pane/cli depends on it.
      - name: publish @pane/core
        run: npm publish --workspace @pane/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish @pane/cli
        run: npm publish --workspace @pane/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
