name: release-image

# Builds the relay container image(s) and pushes them to GitHub Container
# Registry when a v* tag is pushed. Self-hosters `docker pull` a versioned
# image instead of cloning the repo and building locally.
#
# Two variants are published from the one Dockerfile, selected by the
# DATABASE_PROVIDER build arg:
#
#   ghcr.io/<owner>/paneui:<version>            — SQLite (the self-host default)
#   ghcr.io/<owner>/paneui:latest
#   ghcr.io/<owner>/paneui:<version>-postgres   — Postgres (the hosted build)
#   ghcr.io/<owner>/paneui:latest-postgres
#
# No secrets to configure: GHCR auth uses the built-in GITHUB_TOKEN.
#
# Triggered by a v* tag (the normal release path), or run manually from the
# Actions tab (workflow_dispatch) — useful for publishing an image ahead of a
# tagged release, e.g. to bootstrap a hosted deployment.

on:
  push:
    tags:
      - "v*"
    # Every merge to main also rebuilds the image so the hosted dev env can
    # track main without a release. Produces :main / :main-postgres (branch
    # tag) and :sha-<7>/:sha-<7>-postgres (immutable per-commit tag). The
    # :latest flavor still moves — guarded by the SQLite smoke test below.
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0). Also always tagged `latest` and the commit SHA."
        required: false
        default: "latest"

jobs:
  image:
    name: build and push relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # SQLite — the default self-host image. Plain semver tags.
          - provider: sqlite
            tag-suffix: ""
          # Postgres — the hosted build. Same versions, `-postgres` suffix.
          - provider: postgres
            tag-suffix: "-postgres"
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives the image tags. On a v* tag push: the exact version
      # (v1.2.3 -> 1.2.3), the minor series (1.2), the major (1), and `latest`.
      # On a manual run: the `tag` input verbatim, plus `latest`. Either way a
      # commit-SHA tag is added so every image is traceable. The matrix
      # `tag-suffix` appends `-postgres` for the Postgres variant, so the
      # SQLite build owns the unsuffixed tags and the two never collide.
      #
      # `onlatest=true` is LOAD-BEARING. Without it, `docker/metadata-action`
      # applies `suffix` only to the version-derived tags (`{{version}}`,
      # `{{major}}.{{minor}}`, …) but NOT to `:latest`. Both matrix variants
      # then race for bare `:latest` and whichever pushes second wins —
      # historically the postgres one — leaving self-hosters who follow the
      # documented SQLite quickstart with an image they can't boot ("URL must
      # start with postgres://"). See #170 for the failure mode + repro.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paneui
          flavor: |
            latest=true
            suffix=${{ matrix.tag-suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (${{ matrix.provider }})
        uses: docker/build-push-action@v7
        with:
          # Build context is the monorepo root — the Dockerfile copies the
          # workspace manifests and expects root context.
          context: .
          file: packages/relay/Dockerfile
          build-args: |
            DATABASE_PROVIDER=${{ matrix.provider }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-provider cache scope so the two variants don't evict each other.
          cache-from: type=gha,scope=${{ matrix.provider }}
          cache-to: type=gha,mode=max,scope=${{ matrix.provider }}

  # After both matrix variants have pushed, pull `:latest` and run it with the
  # documented SQLite-style DATABASE_URL. A passing /healthz proves the bare
  # `:latest` tag is the SQLite variant — catches a future regression of #170
  # where a flavor-tag misconfiguration lets the postgres variant overwrite
  # `:latest`. The smoke test is intentionally minimal: it does not exercise
  # any features (CI already covers those), only that the image self-hosters
  # download from the documented quickstart can boot.
  smoke-test-latest-sqlite:
    name: smoke-test :latest (SQLite, self-host default)
    runs-on: ubuntu-latest
    needs: image
    permissions:
      # Needed to docker pull from ghcr.io with the in-workflow token.
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull :latest
        run: docker pull ghcr.io/${{ github.repository_owner }}/paneui:latest

      - name: Run :latest with SQLite-style env (must boot)
        run: |
          docker run -d --name pane-smoke \
            -e NODE_ENV=development \
            -e PORT=3000 \
            -e DATABASE_URL='file:/app/data/pane.db' \
            -e API_KEY='pane_smoke_test_key_0000000000000000' \
            -e PANE_SECRET_KEY="$(openssl rand -base64 32)" \
            -e REGISTRATION_MODE=closed \
            -p 3001:3000 \
            ghcr.io/${{ github.repository_owner }}/paneui:latest
          # Capture logs in case the smoke fails — without this the container
          # is unlabelled noise; with it the next step's failure surfaces the
          # Prisma "URL must start with postgres://" error that defines #170.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/healthz > /dev/null 2>&1; then
              echo "OK :latest booted with SQLite env on attempt $i"
              docker logs pane-smoke 2>&1 | grep -i 'starting pane relay' | head -1
              exit 0
            fi
            sleep 2
          done
          echo "::error::ghcr.io/${{ github.repository_owner }}/paneui:latest did NOT boot with SQLite-style DATABASE_URL after 60s — regression of #170 (postgres variant overwrote :latest)."
          docker logs pane-smoke 2>&1 | tail -40
          exit 1

      - name: Teardown
        if: always()
        run: docker rm -f pane-smoke || true

  # Tells aerolalit/paneui-ops to roll the hosted DEV relay onto this build.
  # Fires only on a successful main-branch push (not on tags — a tagged
  # release rolls PROD via deploy-prod-relay below — and not on
  # workflow_dispatch, which is for ad-hoc publishes that shouldn't
  # auto-redeploy anything). The OPS_DEPLOY_TOKEN is a fine-grained PAT
  # scoped to paneui-ops with Actions: read+write.
  notify-ops:
    name: dispatch dev-relay deploy
    needs: [image, smoke-test-latest-sqlite]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send repository_dispatch to paneui-ops
        env:
          OPS_DEPLOY_TOKEN: ${{ secrets.OPS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$OPS_DEPLOY_TOKEN" ]; then
            echo "::warning::OPS_DEPLOY_TOKEN not set — skipping dev redeploy"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $OPS_DEPLOY_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aerolalit/paneui-ops/dispatches \
            -d '{"event_type":"deploy-dev-relay","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}}'
          echo "→ dispatched deploy-dev-relay for ${{ github.sha }}"

  # Tells aerolalit/paneui-ops to roll the hosted PROD relay onto this release.
  # Fires only on a v* tag push, after both image variants are built and the
  # :latest SQLite smoke passes — so the <version>-postgres image the prod
  # deploy pulls is guaranteed to exist. The receiving side (paneui-ops
  # relay-deploy.yml) listens for repository_dispatch type "deploy-prod-relay",
  # reads client_payload.version, and deploys with MIN_CLI_VERSION=match-version
  # behind its own /healthz gate + ACA zero-downtime shift. Same OPS_DEPLOY_TOKEN
  # as notify-ops. Rollback stays manual: dispatch relay-deploy with the
  # previous version.
  deploy-prod-relay:
    name: dispatch prod-relay deploy
    needs: [image, smoke-test-latest-sqlite]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send repository_dispatch to paneui-ops
        env:
          OPS_DEPLOY_TOKEN: ${{ secrets.OPS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$OPS_DEPLOY_TOKEN" ]; then
            echo "::warning::OPS_DEPLOY_TOKEN not set — skipping prod relay deploy"
            exit 0
          fi
          # Strip the leading "v" so the version matches the image tag
          # (tag v0.0.19 -> image ghcr.io/.../paneui:0.0.19-postgres).
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $OPS_DEPLOY_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aerolalit/paneui-ops/dispatches \
            -d "{\"event_type\":\"deploy-prod-relay\",\"client_payload\":{\"version\":\"$VERSION\"}}"
          echo "→ dispatched deploy-prod-relay for $VERSION"
