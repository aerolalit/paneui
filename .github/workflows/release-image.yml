name: release-image

# Builds the relay container image and pushes it to GitHub Container Registry
# when a v* tag is pushed. Self-hosters then `docker pull` a versioned image
# instead of cloning the repo and building locally.
#
# The image is the SQLite self-host build (the default Dockerfile target).
# Postgres / hosted deployment is a separate path (issue #40).
#
# No secrets to configure: GHCR auth uses the built-in GITHUB_TOKEN.

on:
  push:
    tags:
      - "v*"

jobs:
  image:
    name: build and push relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives tags from the git ref: the exact version (v1.2.3 -> 1.2.3),
      # the minor series (1.2), and `latest`. ghcr.io/<owner>/pane, lowercased.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pane
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the monorepo root — the Dockerfile copies the
          # workspace manifests and expects root context.
          context: .
          file: packages/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
