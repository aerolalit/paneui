name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Guards that prisma/schema.prisma (sqlite) and prisma/postgres/schema.prisma
  # (postgres) keep identical model/enum definitions — only the datasource
  # block and @db.* annotations may differ. Pure Node, no build or generated
  # client needed, so it runs standalone and in parallel.
  schema-sync:
    name: schema sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run check:schema-sync

  # ESLint + Prettier check. Independent of build — runs in parallel and
  # doesn't need the compiled output. The plain (non-type-checked)
  # typescript-eslint rule set means the generated Prisma client isn't
  # required either, so no `generate` step here.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

  # Build + typecheck every workspace package (core, relay, cli).
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @paneui/relay -- sqlite

      - run: npm run typecheck

      - run: npm run build

  # Fast unit suite — runs on every push across all workspaces (core, cli,
  # relay). Sub-30s feedback signal on broken leaves (validation, crypto,
  # ssrf, config, serialize, keys, webhook, the client + argv + input units).
  unit:
    name: unit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @paneui/relay -- sqlite

      # @paneui/cli's unit tests import @paneui/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:unit

  # E2E against SQLite — real DB / WS / HTTP. Runs after unit passes.
  e2e-sqlite:
    name: e2e (sqlite)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @paneui/relay -- sqlite

      # relay's e2e suite imports @paneui/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:e2e

  # Same suite against a real Postgres 16 service. Catches engine-specific
  # divergence (P2002 catch path, JSONB vs TEXT, transaction isolation).
  e2e-postgres:
    name: e2e (postgres)
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pane
          POSTGRES_PASSWORD: pane
          POSTGRES_DB: pane_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pane"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Azurite — Microsoft-published Azure Blob Storage emulator. The
      # AzureBlobStore conformance tests run against this on every PR; the
      # corresponding real-Azure run is gated behind workflow_dispatch and
      # cron (separate workflow). See proposal #152 / #154 — the matrix in
      # docs/BLOB_BACKENDS.md is the source of truth for "supported".
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.31.0
        ports:
          - 10000:10000 # blob service
          - 10001:10001 # queue service (unused)
          - 10002:10002 # table service (unused)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate:postgres --workspace @paneui/relay

      # relay's e2e suite imports @paneui/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://pane:pane@localhost:5432/pane_test
          # AzureBlobStore conformance tests gate on this — when set, they
          # round-trip against the Azurite service container above. Locally
          # the env var is unset by default and the suite skips cleanly.
          AZURITE_URL: http://127.0.0.1:10000
