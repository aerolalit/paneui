name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast unit suite — runs on every push. Sub-30s feedback signal on broken
  # leaves (validation, crypto, ssrf, config, serialize, keys, webhook).
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma', 'package-lock.json') }}

      - run: npx prisma generate

      - run: npm run typecheck

      - run: npm run test:unit

  # E2E against SQLite — real DB / WS / HTTP. Runs after unit passes.
  e2e-sqlite:
    name: e2e (sqlite)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-sqlite-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma', 'package-lock.json') }}

      - run: npx prisma generate

      - run: npm run test:e2e

  # Same suite against a real Postgres 16 service. Catches engine-specific
  # divergence (P2002 catch path, JSONB vs TEXT, transaction isolation).
  e2e-postgres:
    name: e2e (postgres)
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pane
          POSTGRES_PASSWORD: pane
          POSTGRES_DB: pane_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pane"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-pg-${{ runner.os }}-${{ hashFiles('prisma/schema.postgres.prisma', 'package-lock.json') }}

      - run: npx prisma generate --schema prisma/schema.postgres.prisma

      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://pane:pane@localhost:5432/pane_test
