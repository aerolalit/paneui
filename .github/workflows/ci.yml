name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ESLint + Prettier check. Independent of build — runs in parallel and
  # doesn't need the compiled output. The plain (non-type-checked)
  # typescript-eslint rule set means the generated Prisma client isn't
  # required either, so no `generate` step here.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

  # Build + typecheck every workspace package (core, relay, cli).
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @pane/relay -- sqlite

      - run: npm run typecheck

      - run: npm run build

  # Fast unit suite — runs on every push across all workspaces (core, cli,
  # relay). Sub-30s feedback signal on broken leaves (validation, crypto,
  # ssrf, config, serialize, keys, webhook, the client + argv + input units).
  unit:
    name: unit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @pane/relay -- sqlite

      # pane-cli's unit tests import @pane/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:unit

  # E2E against SQLite — real DB / WS / HTTP. Runs after unit passes.
  e2e-sqlite:
    name: e2e (sqlite)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate --workspace @pane/relay -- sqlite

      # relay's e2e suite imports @pane/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:e2e

  # Same suite against a real Postgres 16 service. Catches engine-specific
  # divergence (P2002 catch path, JSONB vs TEXT, transaction isolation).
  e2e-postgres:
    name: e2e (postgres)
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pane
          POSTGRES_PASSWORD: pane
          POSTGRES_DB: pane_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pane"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run generate:postgres --workspace @pane/relay

      # relay's e2e suite imports @pane/core's compiled output; build all
      # workspaces first so the import resolves.
      - run: npm run build

      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://pane:pane@localhost:5432/pane_test
