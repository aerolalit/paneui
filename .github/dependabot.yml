# Dependabot configuration for pane.
#
# Primary intent: keep `sharp` (the libvips binding underpinning the
# blob polyglot defense) patched within 24h of upstream patch releases.
# See docs/SECURITY-POLYGLOTS.md and packages/relay/test-fixtures/polyglots/.
#
# Sharp is pinned with a tilde range in packages/relay/package.json
# (~0.34.x). Patch bumps are auto-PR'd here daily; the polyglot suite +
# the rest of CI gate auto-merge (.github/workflows/dependabot-auto-merge.yml).
# Minor / major bumps land as regular PRs requiring manual review.
#
# IMPORTANT: this is an npm *workspaces* monorepo (workspaces: ["packages/*"])
# with a single root package-lock.json. Dependabot must run from the root
# directory only. Per-package `directory:` entries (e.g. /packages/relay) make
# Dependabot treat each package as standalone and resolve its workspace
# siblings (@paneui/core, etc.) from the public registry — which fails with
# "Dependabot can't access a private package registry" and produces a broken
# lockfile that can never rebase. A single "/" entry is workspace-aware: it
# covers every package under packages/* and regenerates the one root lockfile.

version: 2
updates:
  # Single npm entry at the workspace root — covers all packages/* via npm
  # workspaces. The security-sensitive surface (sharp, in packages/relay) is
  # patched daily in its own PR so the polyglot suite gates auto-merge;
  # everything else is grouped to keep PR noise low.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      sharp:
        patterns:
          - "sharp"
      all-other-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "sharp"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version bumps for sharp need a manual review + corpus rerun
      # against a fresh libvips. Block Dependabot from opening them.
      - dependency-name: "sharp"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned but patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "ci"
