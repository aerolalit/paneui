<!doctype html>
<!--
  Source for the social-preview image (og.png). This page is sized to the
  exact OG/Twitter card spec (1200×630) and renders the brand mark + the
  hero headline in the site's colour palette.

  To produce og.png from this file:
    1. Open this file in Chrome at 100% zoom.
    2. Open DevTools → toggle device toolbar → set width 1200, height 630, DPR 2.
    3. Capture: DevTools command palette → "Capture full size screenshot".
    4. Save the result as /site/og.png next to index.html.

  Alternatively, with playwright/puppeteer:
    page.setViewport({ width: 1200, height: 630, deviceScaleFactor: 2 });
    page.screenshot({ path: 'site/og.png' });
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pane — og image</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131c38;
    --border: #25305c;
    --fg: #eef1fb;
    --muted: #99a2c4;
    --agent: #a78bfa;
    --human: #22d3ee;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg); -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* the same hero radial glows the live page uses */
  body::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(620px 320px at 78% 6%, rgba(34,211,238,.22), transparent 70%),
      radial-gradient(560px 360px at 12% 30%, rgba(167,139,250,.28), transparent 70%);
  }
  .wrap {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 0 96px; gap: 64px;
  }
  /* left + right ambient party tiles, same as the hero side icons */
  .tile {
    width: 140px; height: 140px; border-radius: 32px;
    display: flex; align-items: center; justify-content: center;
    justify-self: center;
  }
  .tile svg { width: 70px; height: 70px; }
  .tile.agent {
    background: linear-gradient(150deg, rgba(167,139,250,.38), rgba(167,139,250,.08));
    box-shadow: 0 0 90px -8px rgba(167,139,250,.65), inset 0 0 0 1.5px rgba(167,139,250,.4);
    color: var(--agent);
  }
  .tile.human {
    background: linear-gradient(150deg, rgba(34,211,238,.36), rgba(34,211,238,.08));
    box-shadow: 0 0 90px -8px rgba(34,211,238,.6), inset 0 0 0 1.5px rgba(34,211,238,.4);
    color: var(--human);
  }
  .center { text-align: center; min-width: 0; }
  .brand {
    display: inline-flex; align-items: center; gap: 16px; margin-bottom: 28px;
  }
  .brand .logo { width: 52px; height: 52px; }
  .brand .nm {
    font-size: 32px; font-weight: 800; letter-spacing: -.02em;
  }
  h1 {
    font-size: 60px; line-height: 1.05; font-weight: 800; letter-spacing: -.035em;
    margin: 0 0 22px;
  }
  h1 .grad {
    background: linear-gradient(120deg, var(--agent), var(--human));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lede {
    font-size: 22px; color: var(--muted); margin: 0 0 36px; line-height: 1.45;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 600; color: var(--muted);
    background: var(--panel); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 999px;
  }
  .tag .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--human);
    box-shadow: 0 0 0 5px rgba(34,211,238,.22);
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- LEFT: agent tile -->
    <div class="tile agent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="8" width="16" height="12" rx="3"/>
        <path d="M12 8V4"/><circle cx="12" cy="3" r="1.4" fill="currentColor"/>
        <line x1="9" y1="13" x2="9" y2="13.5"/><line x1="15" y1="13" x2="15" y2="13.5"/>
        <line x1="2.5" y1="13" x2="2.5" y2="15.5"/><line x1="21.5" y1="13" x2="21.5" y2="15.5"/>
      </svg>
    </div>

    <!-- CENTRE: brand + headline + lede -->
    <div class="center">
      <div class="brand">
        <svg class="logo" viewBox="0 0 100 100" aria-hidden="true">
          <rect width="100" height="100" rx="22" fill="#0f172a" />
          <circle cx="62" cy="58" r="17" fill="#22d3ee" />
          <rect x="20" y="26" width="40" height="32" rx="10" fill="#0f172a" />
          <rect x="24" y="30" width="32" height="24" rx="7" fill="#a78bfa" />
          <circle cx="33.5" cy="42" r="3.4" fill="#0f172a" />
          <circle cx="46.5" cy="42" r="3.4" fill="#0f172a" />
        </svg>
        <span class="nm">Pane</span>
      </div>
      <h1>A round-trip UI channel between <span class="grad">agents and humans</span>.</h1>
      <p class="lede">
        An agent hands a human a rich interactive UI by URL and gets a structured answer back.
      </p>
      <span class="tag"><span class="dot"></span>Open-core · MIT licensed</span>
    </div>

    <!-- RIGHT: human tile -->
    <div class="tile human">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M5 21a7 7 0 0 1 14 0"/>
      </svg>
    </div>
  </div>
</body>
</html>
